<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="九界修真世界观百科全书，包含人物图鉴、七大体系可视化、故事线梳理">
    <title>九界修真世界 - 百科系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* lifeline配色变量 */
        :root {
            --bg-primary: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            --text-primary: #ccd6f6;
            --text-secondary: #8892b0;
            --accent: #64ffda;
            --highlight: #ff9f1c;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
        }
        
        /* 导航按钮颜色调整 */
        .nav-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #8892b0;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            background: rgba(100, 255, 218, 0.15);
            color: #64ffda;
            border-color: rgba(100, 255, 218, 0.3);
        }
        
        /* 文字颜色 */
        .text-title-gradient {
            background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6, #3498db, #2ecc71);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes gradient {
            0%, to { background-position: 0% center; }
            50% { background-position: 200% center; }
        }
    </style>
</head>
<body class="text-gray-200">
    <!-- 导航栏 -->
    <nav class="fixed top-0 w-full z-50" style="background: rgba(26, 26, 46, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-title-gradient">九界修真</h1>
            <div class="hidden md:flex space-x-2">
                <button onclick="scrollToSection('overview')" class="nav-btn px-3 py-1 rounded-full text-sm">总览</button>
                <button onclick="scrollToSection('characters')" class="nav-btn px-3 py-1 rounded-full text-sm">人物</button>
                <button onclick="scrollToSection('systems')" class="nav-btn px-3 py-1 rounded-full text-sm">体系</button>
                <button onclick="scrollToSection('story')" class="nav-btn px-3 py-1 rounded-full text-sm">故事</button>
            </div>
        </div>
    </nav>

    <!-- 移动端导航 -->
    <div class="md:hidden fixed bottom-0 w-full z-50" style="background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="flex justify-around py-2">
            <button onclick="scrollToSection('overview')" class="flex flex-col items-center text-xs" style="color: #8892b0;">
                <span class="text-lg">🏠</span>总览
            </button>
            <button onclick="scrollToSection('characters')" class="flex flex-col items-center text-xs" style="color: #8892b0;">
                <span class="text-lg">👥</span>人物
            </button>
            <button onclick="scrollToSection('systems')" class="flex flex-col items-center text-xs" style="color: #8892b0;">
                <span class="text-lg">⚙️</span>体系
            </button>
            <button onclick="scrollToSection('story')" class="flex flex-col items-center text-xs" style="color: #8892b0;">
                <span class="text-lg">📖</span>故事
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 pt-20 pb-20 md:pb-10">

        <!-- 模块1：引导总览页 -->
        <section id="overview" class="mb-16 scroll-mt-20 fade-in">
            <div class="text-center py-10 rounded-2xl" style="background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);">
                <h2 class="text-3xl font-bold mb-4" style="color: #ccd6f6;">九界封闭能量循环</h2>
                <p class="text-lg mb-6" style="color: #ff9f1c;">→ 主角破局引入宇宙能 →</p>
                <p class="text-md max-w-2xl mx-auto mb-8" style="color: #8892b0;">探讨平衡/自由/开放/宿命</p>
                
                <div class="max-w-3xl mx-auto rounded-xl p-6" style="background: rgba(0, 0, 0, 0.3);">
                    <h3 class="text-xl font-semibold mb-4" style="color: #64ffda;">七大体系关系图谱</h3>
                    <div class="text-left text-sm space-y-2" style="color: #8892b0;">
                        <p><span style="color: #a78bfa;" class="font-bold">能源为根</span> → <span style="color: #60a5fa;" class="font-bold">灵根为核</span> → <span style="color: #34d399;" class="font-bold">功法为梯</span></p>
                        <p><span style="color: #fbbf24;" class="font-bold">势力为场</span> → <span style="color: #f97316;" class="font-bold">经济为网</span> → <span style="color: #f87171;" class="font-bold">黑暗为刃</span> → <span style="color: #4ade80;" class="font-bold">宝药为盾</span></p>
                        <p class="text-center mt-4" style="color: #6b7280;">七层递进自洽修真生命体</p>
                    </div>
                </div>
                
                <button onclick="scrollToSection('characters')" class="mt-8 px-6 py-3 rounded-full shadow-lg" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white;">
                    开始探索 →
                </button>
            </div>
        </section>

        <!-- 模块2：人物图鉴 -->
        <section id="characters" class="mb-16 scroll-mt-20">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8">
                <h2 class="text-2xl font-bold" style="color: #ccd6f6;">人物图鉴</h2>
                
                <!-- 搜索框 -->
                <div class="mt-4 md:mt-0 flex gap-2">
                    <input type="text" id="search-input" placeholder="搜索人物..." 
                           class="px-4 py-2 rounded-full text-sm"
                           style="background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); color: #e0e0e0;"
                           oninput="handleSearch(this.value)">
                </div>
            </div>
            
            <!-- 筛选按钮 -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button class="filter-btn active px-4 py-2 rounded-full text-sm" data-camp="all" onclick="handleFilter('all')">全部</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm" data-camp="protagonist" onclick="handleFilter('protagonist')">主角团</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm" data-camp="antagonist" onclick="handleFilter('antagonist')">反派</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm" data-camp="love" onclick="handleFilter('love')">爱情线</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm" data-camp="special" onclick="handleFilter('special')">特殊</button>
            </div>
            
            <!-- 人物卡片网格 -->
            <div id="characters-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- 动态渲染 -->
            </div>
            
            <p id="characters-empty" class="hidden text-center mt-4" style="color: #8892b0;">未找到匹配的人物</p>
        </section>

        <!-- 模块3：七大体系可视化 -->
        <section id="systems" class="mb-16 scroll-mt-20">
            <h2 class="text-2xl font-bold text-center mb-8" style="color: #ccd6f6;">七大体系可视化</h2>
            <div id="systems-container" class="space-y-6">
                <!-- 动态渲染 -->
            </div>
        </section>

        <!-- 模块4：故事线梳理 -->
        <section id="story" class="scroll-mt-20">
            <h2 class="text-2xl font-bold text-center mb-8" style="color: #ccd6f6;">故事线梳理</h2>
            
            <!-- 三条主线概览 -->
            <div class="grid md:grid-cols-3 gap-4 mb-8">
                <div class="p-4 rounded-lg" style="border-left: 4px solid #f87171; background: rgba(248, 113, 113, 0.1);">
                    <h4 class="font-bold" style="color: #f87171;">生存+势力线</h4>
                    <p class="text-sm mt-2" style="color: #8892b0;">凡人建势力→统战国→修真探九界→九界守护者</p>
                </div>
                <div class="p-4 rounded-lg" style="border-left: 4px solid #60a5fa; background: rgba(96, 165, 250, 0.1);">
                    <h4 class="font-bold" style="color: #60a5fa;">回家+救赎线</h4>
                    <p class="text-sm mt-2" style="color: #8892b0;">寻罗布泊之眼→揭核战关联→救地球家人→治愈地球</p>
                </div>
                <div class="p-4 rounded-lg" style="border-left: 4px solid #4ade80; background: rgba(74, 222, 128, 0.1);">
                    <h4 class="font-bold" style="color: #4ade80;">人性+道线</h4>
                    <p class="text-sm mt-2" style="color: #8892b0;">人性黑暗与光辉→修仙即修心→克服本性证道</p>
                </div>
            </div>
            
            <!-- 时间轴 -->
            <div id="storyline-container">
                <!-- 动态渲染 -->
            </div>
        </section>
    </main>

    <!-- 人物详情弹窗 -->
    <div id="character-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4" style="background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);">
        <div class="rounded-2xl max-w-2xl w-full max-h-screen overflow-y-auto" style="background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255, 255, 255, 0.15);">
            <div class="px-6 py-4 flex justify-between items-center" style="border-bottom: 1px solid rgba(100, 255, 218, 0.2);">
                <h2 id="modal-title" class="text-2xl font-bold" style="color: #64ffda;"></h2>
                <button onclick="closeModal()" class="text-2xl" style="color: #8892b0;">&times;</button>
            </div>
            <div id="modal-content" class="p-6"></div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW 注册成功'))
                    .catch(err => console.log('SW 注册失败:', err));
            });
        }
        
        // 搜索处理
        function handleSearch(value) {
            state.filters.search = value;
            renderCharacters();
        }
        
        // 筛选处理
        function handleFilter(camp) {
            state.filters.camp = camp;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.camp === camp) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderCharacters();
        }
    </script>
</body>
</html>
