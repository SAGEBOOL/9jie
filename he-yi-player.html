<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="九界归尘 - 九界修真世界有声书">
    <title>九界归尘 - 九界修真世界</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: #64ffda; font-size: 24px; cursor: pointer; text-decoration: none; transition: all 0.3s ease; }
        .back-btn:hover { background: rgba(100,255,218,0.2); transform: scale(1.1); }
        
        /* 留言区域：固定高度显示5条，溢出隐藏 */
        #comment-scroll-container {
            height: 220px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
        }
        .comment-item {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ccd6f6;
            font-size: 13px;
            line-height: 1.5;
            font-family: "FangSong", "STFangsong", "仿宋", serif;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }
        .comment-like {
            align-self: flex-end;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
            color: #fff;
            padding: 0;
            line-height: 1;
        }
        .comment-like.liked { color: #fff; }
        .comment-item .comment-author { color: #64ffda; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .comment-item .comment-time { color: #6b7280; font-size: 10px; }
        
        /* ========== 3D卡片轮播样式 ========== */
        .carousel-stage-3d {
            position: relative;
            width: 80vw;
            max-width: 340px;
            height: 60vw;
            max-height: 420px;
            min-height: 280px;
            margin: 10px auto;
            cursor: grab;
            perspective: 1200px;
            touch-action: none;
        }
        .carousel-stage-3d:active { cursor: grabbing; }
        .carousel-track-3d { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        .podcast-3d-card {
            position: absolute;
            width: 55vw;
            max-width: 220px;
            height: 75vw;
            max-height: 300px;
            min-height: 200px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease, z-index 0.1s ease;
            cursor: pointer;
            user-select: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .podcast-3d-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(100, 255, 218, 0.08), rgba(167, 139, 250, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .podcast-3d-card.active .podcast-3d-card-inner {
            background: linear-gradient(135deg, rgba(100, 255, 218, 0.15), rgba(167, 139, 250, 0.15));
            border-color: rgba(100, 255, 218, 0.4);
        }
        .podcast-3d-card-icon { font-size: 48px; margin-bottom: 16px; filter: drop-shadow(0 0 8px rgba(100, 255, 218, 0.3)); padding: 0; overflow: hidden; }
        .podcast-3d-card-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        .podcast-3d-card-title { color: #e0e0e0; font-size: 13px; font-weight: bold; text-align: center; line-height: 1.4; max-width: 90%; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .podcast-3d-card-playing { position: absolute; bottom: 10px; right: 10px; font-size: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        
        /* 进度条 */
        #progressBarBg { position: relative; width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; cursor: pointer; }
        #progressBarFill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(to right, #3B82F6, #10B981); border-radius: 2px; transition: width 0.3s ease; }
        
        /* 播放控制按钮 */
        #playBtn { display: flex; justify-content: center; align-items: center; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #3B82F6, #10B981); border: none; color: white; cursor: pointer; transition: all 0.2s ease; }
        
        /* 字幕区域 */
        #subtitle-wrap { display: none; text-align: center; margin: 10px 0; min-height: 60px; padding: 12px 16px; background: rgba(0,0,0,0.5); border-radius: 12px; backdrop-filter: blur(10px); }
        #subtitle { margin: 0; font-size: 15px; color: #e0e0e0; line-height: 1.6; font-family: 'FangSong', 'STFangsong', '仿宋', serif; }

        .author-avatars { position: fixed; top: 20px; left: 80px; z-index: 100; display: flex; gap: 12px; }
        .author-avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s ease; overflow: hidden; background: rgba(100,255,218,0.15); display: flex; align-items: center; justify-content: center; color: #64ffda; font-size: 11px; font-weight: bold; backdrop-filter: blur(10px); }
        .author-avatar:hover { border-color: #64ffda; transform: scale(1.1); }
        .author-avatar.active { border-color: #64ffda; box-shadow: 0 0 15px rgba(100,255,218,0.4); }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <a href="he-yi.html" class="back-btn" title="返回人物图谱">←</a>
    
    <!-- 播客播放器 -->
    <div style="max-width: 100vw; width: 100%; margin: 0 auto; padding: 60px 10px 10px; box-sizing: border-box; position: relative;">
        
        <h2 style="text-align: center; font-size: 24px; color: #64ffda; margin-bottom: 10px;">🎧 河一播客</h2>
        <p style="text-align: center; color: #8892b0; margin-bottom: 20px;">点击曲目即可播放</p>
        
        <!-- 3D轮播舞台 -->
        <div class="carousel-stage-3d" id="carousel-stage-3d">
            <div class="carousel-track-3d" id="carousel-track-3d">
                <!-- 卡片由JS动态生成 -->
            </div>
        </div>
        
        <!-- 字幕显示区域 -->
        <div id="subtitle-wrap">
            <p id="subtitle"></p>
        </div>

        <!-- 歌曲信息 -->
        <div style="text-align: center; margin: 30px 0;">
            <div id="songInfoText" style="transition: opacity 0.3s ease, transform 0.3s ease;">
                <h2 id="songTitle" style="margin: 0; font-size: 28px; font-weight: 700; color: white;">选择曲目</h2>
                <p id="songArtist" style="margin: 8px 0 0; font-size: 18px; color: rgba(255,255,255,0.8);">九界归尘</p>
            </div>
            
            <!-- 进度条 -->
            <div style="width: 100%; margin-top: 20px;">
                <div id="progressBarBg">
                    <div id="progressBarFill"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.6);">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
        </div>
        
        <!-- 播放控制 -->
        <div style="width: 100%; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="prevBtn" style="display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;">⏮</button>
                    <button id="playBtn">▶️</button>
                    <button id="nextBtn" style="display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;">⏭</button>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img id="miniCover" src="assets/images/河一.png" style="width: 40px; height: 40px; border-radius: 6px; object-fit: cover;">
                    <div style="display: flex; flex-direction: column; justify-content: center;">
                        <p id="miniTitle" style="margin: 0; font-size: 14px; font-weight: 600; color: white;">选择曲目</p>
                        <p id="miniArtist" style="margin: 2px 0 0; font-size: 12px; color: rgba(255,255,255,0.7);">九界归尘</p>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button id="bgmToggleBtn" onclick="toggleBgm()" style="display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;">🔊</button>
                    <button onclick="toggleSharePanel()" style="display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;">🔗</button>
                    <button id="sleepTimerBtn" onclick="toggleSleepPanel()" style="display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; cursor: pointer;">⏱️</button>
                </div>
            </div>
        </div>
        
        <!-- 分享面板 -->
        <div id="share-panel" style="display: none; background: rgba(26,26,46,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 16px; margin-top: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h4 style="color: #e0e0e0; font-size: 14px; font-weight: bold;">分享播客</h4>
                <button onclick="toggleSharePanel()" style="background: none; border: none; color: #8892b0; cursor: pointer; font-size: 20px;">×</button>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button onclick="copyPodcastLink()" style="flex: 1; min-width: 120px; background: rgba(100,255,218,0.1); border: 1px solid rgba(100,255,218,0.3); color: #64ffda; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13px;">📋 复制链接</button>
                <button onclick="shareToWeChat()" style="flex: 1; min-width: 120px; background: rgba(7,193,96,0.1); border: 1px solid rgba(7,193,96,0.3); color: #07c160; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13px;">💬 微信</button>
                <button onclick="shareToWeibo()" style="flex: 1; min-width: 120px; background: rgba(230,22,45,0.1); border: 1px solid rgba(230,22,45,0.3); color: #e6162d; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 13px;">📢 微博</button>
            </div>
        </div>
        
        <!-- 定时关闭面板 -->
        <div id="sleep-panel" style="display: none; background: rgba(26,26,46,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 16px; margin-top: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h4 style="color: #e0e0e0; font-size: 14px; font-weight: bold;">⏱️ 定时关闭</h4>
                <button onclick="toggleSleepPanel()" style="background: none; border: none; color: #8892b0; cursor: pointer; font-size: 20px;">×</button>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button onclick="setSleepTimer('off')" class="sleep-option" data-mode="off" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #8892b0; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; text-align: left;">关闭定时</button>
                <button onclick="setSleepTimer('endOfTrack')" class="sleep-option" data-mode="endOfTrack" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #8892b0; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; text-align: left;">播完本集后关闭</button>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button onclick="setSleepTimer('afterEpisodes', document.getElementById('sleep-episodes').value)" class="sleep-option" data-mode="afterEpisodes" style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #8892b0; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; text-align: left;">播完</button>
                    <select id="sleep-episodes" onchange="if(document.querySelector('.sleep-option[data-mode=afterEpisodes]').style.background.includes('rgba(100,255,218')) setSleepTimer('afterEpisodes', this.value)" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e0e0e0; padding: 8px 10px; border-radius: 8px; font-size: 13px; cursor: pointer;">
                        <option value="1">1集</option>
                        <option value="2">2集</option>
                        <option value="3">3集</option>
                        <option value="5">5集</option>
                        <option value="10">10集</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button onclick="setSleepTimer('afterDuration', document.getElementById('sleep-duration').value)" class="sleep-option" data-mode="afterDuration" style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #8892b0; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; text-align: left;">定时</button>
                    <select id="sleep-duration" onchange="if(document.querySelector('.sleep-option[data-mode=afterDuration]').style.background.includes('rgba(100,255,218')) setSleepTimer('afterDuration', this.value)" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e0e0e0; padding: 8px 10px; border-radius: 8px; font-size: 13px; cursor: pointer;">
                        <option value="0.5">0.5小时</option>
                        <option value="1">1小时</option>
                        <option value="1.5">1.5小时</option>
                        <option value="2">2小时</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 留言区 -->
    <div style="max-width: 500px; margin: 30px auto; padding: 0 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="color: #e0e0e0; font-size: 18px; font-weight: bold;">💬 听众留言</h3>
            <span style="color: #64ffda; font-size: 13px;" id="comment-count">0 条留言</span>
        </div>
        <div id="comment-scroll-container">
            <div id="comment-viewport" style="transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);"></div>
        </div>
    </div>
